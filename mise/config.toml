# Global defaults for mise.
# - Runtimes: pin to patch here; override per-project with .mise.toml
# - CLIs: prefer Nix (home.packages). Keep here only when Nix is missing,
#   too old, or a specific version must be pinned independently.
[settings]
disable_backends = ["vfox"]
minimum_release_age = "7d"
pin = true

[settings.pipx]
uvx = true

[settings.github]
# credential_command = "gh auth token"
# use_git_credentials = true

[plugins]
mysql = "https://github.com/iroddis/asdf-mysql"

[tools]
# Runtimes (project-local overrides expected)
go = "1.26.5"
java = "26.0.1"
maven = "3.9.16"
node = "24.18.0"
python = "3.14.6"
rust = "1.96.1"

# CLIs kept in mise (not suitable for Nix yet)
# kubernetes-helm in locked nixpkgs is still 3.x; track Helm 4 here.
helm = "4.2.2"
# snowflake-cli build fails in nixpkgs
"pipx:snowflake-cli" = "3.21.0"

# Language-ecosystem CLIs (npm / cargo)
"npm:agent-browser" = "0.31.1"
"npm:difit" = "5.0.7"
"cargo:keifu" = "0.5.0"
"cargo:filetree" = "0.3.5"
