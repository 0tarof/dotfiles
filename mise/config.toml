[settings]
disable_backends = ["vfox"]
minimum_release_age = "7d"

[settings.pipx]
uvx = true

[settings.github]
credential_command = "gh auth token"

[plugins]
mysql = "https://github.com/iroddis/asdf-mysql"

[tools]
go = "latest"
java = "latest"
maven = "latest"
aws = "latest"
helm = "4"

# [Node.js]
node = "lts"
"npm:@openai/codex" = "latest"
"npm:agent-browser" = "latest"
"npm:difit" = "latest"

# [Python]
python = "3.13"
"pipx:snowflake-cli" = "latest"

# [Rust]
rust = "latest"
"cargo:keifu" = "latest"
"cargo:filetree" = "latest"
